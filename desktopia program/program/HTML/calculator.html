<html>
  <head>
    <link rel="icon" href="../../pngfolder/icon.jpg">
    <title>Standard Calculator</title>
    <link rel="stylesheet" href="../CSS/calculatorstyler.css" />
  </head>
  <body>
    <div class="calculator">
      <input type="text" id="display" disabled />

<div class="buttons">
  <button onclick="clearAll()">C</button>
  <button onclick="clearEntry()">CE</button>
  <button onclick="deleteLast()">DEL</button>
  <button onclick="appendOperator('/')">÷</button>

  <button onclick="appendNumber('7')">7</button>
  <button onclick="appendNumber('8')">8</button>
  <button onclick="appendNumber('9')">9</button>
  <button onclick="appendOperator('*')">&times;</button>

  <button onclick="appendNumber('4')">4</button>
  <button onclick="appendNumber('5')">5</button>
  <button onclick="appendNumber('6')">6</button>
  <button onclick="appendOperator('-')">-</button>

  <button onclick="appendNumber('1')">1</button>
  <button onclick="appendNumber('2')">2</button>
  <button onclick="appendNumber('3')">3</button>
  <button onclick="appendOperator('+')">+</button>

  <!-- Add square root button here -->
  <button onclick="sqrt()" class="wide">√</button>

  <button onclick="appendNumber('0')" class="zero">0</button>
  <button onclick="appendNumber('.')">.</button>
  <button onclick="appendOperator('^')">^</button>
  <button onclick="calculate()" id="equal">=</button>
</div>
    </div>

    <script src="../Java script/calculator controlroom.js"></script>
  </body>
</html>
